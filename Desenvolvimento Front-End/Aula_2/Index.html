<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
</head>
<body>
    <iframe class="iframe" width="560" height="315" src="https://www.youtube-nocookie.com/embed/Sq58nme21n0?si=qyBUEl9zICJBT4t3" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

    <br><br>
    <h1>Cadastro de Usuário</h1>

    <!-- Method, action-->
    <form id="formCadastro">
        <label for="nome">Nome:</label>
        <input type="text" name="nome" id="nome" placeholder="Insira seu nome" required>
        <br><br>

        <label for="email">Email: </label>
        <input type="email" name="email" id="email" placeholder="Insira seu email" required>

        <br><br>

        <label for="idade">Idade:</label>
        <input type="number" name="idade" id="idade" required>
        <br><br>


        <button type="submit">Enviar</button>
    </form>

    <script src="script.js"></script>
</body>
</html>
